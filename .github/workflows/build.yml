name: Apply advanced slicing patch

on:
  push:
    branches:
      - agent/advanced-slicing-tools
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: advanced-slicing-bootstrap
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/advanced-slicing-tools
          fetch-depth: 1

      - name: Apply and publish source patch
        shell: bash
        run: |
          set -Eeuxo pipefail
          trap 'status=$?; echo "BOOTSTRAP_FAILED status=$status line=$LINENO"; git status --short || true; test -f /tmp/advanced-slicing.patch && { wc -c /tmp/advanced-slicing.patch; tail -n 8 /tmp/advanced-slicing.patch; }; exit $status' ERR

          ls -l .agent-patch
          cat .agent-patch/part*.b64 | base64 --decode | gzip --decompress > /tmp/advanced-slicing.patch
          wc -c /tmp/advanced-slicing.patch
          sha256sum /tmp/advanced-slicing.patch
          git apply --check --verbose /tmp/advanced-slicing.patch
          git apply --verbose /tmp/advanced-slicing.patch
          base64 --decode .agent-patch/final-workflow.b64 > .github/workflows/build.yml
          rm -rf .agent-patch
          git diff --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement advanced slicing tools"
          git push origin HEAD:agent/advanced-slicing-tools
